<!doctype html><html lang="en"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1">
<title>Create account — GlitzTracker</title>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@600;700&family=DM+Sans:wght@400;500;600&display=swap" rel="stylesheet">
<style>
:root{--gold:#f5c842;--ink:#f0f4ff;--muted:#8a9ab8;--glass:rgba(8,12,24,0.9);--line:rgba(255,255,255,.1);--serif:"Playfair Display",serif;--sans:"DM Sans",sans-serif}
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:var(--sans);background:#7a90b8;min-height:100vh;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:24px}
.card{background:var(--glass);backdrop-filter:blur(20px);border:1px solid var(--line);border-radius:18px;padding:40px;width:100%;max-width:420px}
.logo{font-family:var(--serif);font-size:22px;font-weight:700;color:var(--ink);text-align:center;margin-bottom:28px}.logo em{color:var(--gold);font-style:normal}
h2{font-family:var(--serif);font-size:22px;color:var(--ink);margin-bottom:6px;text-align:center}
.sub{font-size:13px;color:var(--muted);text-align:center;margin-bottom:20px}
.badge{display:flex;align-items:center;gap:8px;background:rgba(76,175,122,.1);border:1px solid rgba(76,175,122,.2);border-radius:8px;padding:10px 14px;margin-bottom:20px;font-size:13px;color:#7fe8a8}
.flbl{display:block;font-size:11px;font-weight:600;letter-spacing:1px;text-transform:uppercase;color:var(--muted);margin-bottom:5px}
input{width:100%;background:rgba(0,0,0,.35);border:1px solid var(--line);border-radius:7px;padding:10px 12px;color:var(--ink);font-family:var(--sans);font-size:14px;margin-bottom:14px}
input:focus{outline:none;border-color:var(--gold)}
.btn{width:100%;padding:12px;background:var(--gold);color:#1a1000;font-family:var(--sans);font-size:15px;font-weight:700;border:none;border-radius:8px;cursor:pointer;margin-top:4px}
.btn:hover{background:#ffd966}
.link{text-align:center;margin-top:18px;font-size:13px;color:var(--muted)}.link a{color:var(--gold)}
.flash{padding:10px 14px;border-radius:8px;font-size:13px;margin-bottom:14px}
.flash.error{background:rgba(224,85,85,.15);border:1px solid rgba(224,85,85,.3);color:#f09090}
.flash.success{background:rgba(76,175,122,.15);border:1px solid rgba(76,175,122,.3);color:#7fe8a8}
</style></head><body>
<div class="card">
  <div class="logo">Glitz<em>Tracker</em></div>
  <h2>Start tracking</h2>
  <div class="sub">Free forever. No card required.</div>
  <div class="badge">✓ Free plan · 1 route · daily alerts · no card needed</div>
  {% with messages = get_flashed_messages(with_categories=true) %}{% for cat,msg in messages %}<div class="flash {{cat}}">{{msg}}</div>{% endfor %}{% endwith %}
  <form method="POST">
    <label class="flbl">Name</label><input type="text" name="name" placeholder="Brian" autocomplete="name">
    <label class="flbl">Email</label><input type="email" name="email" required autocomplete="email">
    <label class="flbl">Password</label><input type="password" name="password" required minlength="8" autocomplete="new-password">
    <label class="flbl">Confirm password</label><input type="password" name="confirm" required autocomplete="new-password">
    <button class="btn" type="submit">Create free account</button>
  </form>
  <div class="link">Already have an account? <a href="/auth/login">Sign in</a></div>
</div></body></html>
